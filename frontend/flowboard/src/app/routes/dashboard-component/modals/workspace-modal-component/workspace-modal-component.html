<div class="card flex justify-center">
  <p-dialog
    [header]="header"
    (onHide)="onHide()"
    [modal]="true"
    [visible]="visible()"
    [style]="{ width: '25rem' }"
  >
    <div class="mb-4 flex flex-col gap-4">
      <div class="w-full">
        <label
          for="workspaceName"
          class="mb-1 block text-sm font-medium text-white"
          >Workspace Name</label
        >
        <input
          id="workspaceName"
          [formControl]="nameControl"
          placeholder="Workspace name"
          pInputText
          class="w-full flex-auto rounded-lg p-2"
          autocomplete="off"
          (keydown.enter)="save()"
        />
      </div>
      <div class="w-full">
        <label
          for="workspaceCategory"
          class="mb-1 block text-sm font-medium text-white"
          >Workspace Category</label
        >
        <app-dropdown-component
          id="workspaceCategory"
          [formControl]="categoryControl"
          [options]="categoryOptions"
          placeholder="Select Workspace Category"
          optionLabel="name"
          [addOption]="true"
          [addLabelFromSearch]="true"
          filterPlaceholder="Search or create new category..."
          (onAdd)="onAddWorkspaceCategory($event)"
          class="flex-auto rounded-lg"
        ></app-dropdown-component>
      </div>
    </div>
    <div class="flex justify-end gap-4 pt-10">
      <p-button
        [style]="{ backgroundColor: '#18181c', color: '#ffffff', border: 'none' }"
        class="hover:scale-105!"
        label="Cancel"
        (click)="onCancel.emit()"
      />
      <p-button
        [disabled]="!nameControl.value || loading()"
        [class.hover:scale-105!]="nameControl.value"
        [style]="{ backgroundColor: '#ffffff', color: '#18181c', border: 'none' }"
        label="Save"
        (click)="save()"
      />
    </div>
  </p-dialog>
</div>
