<p-drawer [(visible)]="visible" header="Menu" styleClass="w-80">
  <div class="flex h-full flex-col p-2">
    <div class="flex-1 space-y-1">
      <div class="mb-4">
        <label
          class="px-3 text-xs font-semibold tracking-wider text-zinc-500 uppercase"
          >AI Assistants</label
        >
        <button
          (click)="createWorkspaceWithAi()"
          class="group mt-2 flex w-full cursor-pointer items-center gap-3 rounded-xl p-3 text-zinc-200 transition-all hover:bg-indigo-500/10 hover:text-indigo-400"
        >
          <div
            class="flex h-8 w-8 items-center justify-center rounded-lg bg-indigo-500/20 text-indigo-400 group-hover:bg-indigo-500 group-hover:text-white"
          >
            <i class="pi pi-sparkles"></i>
          </div>
          <span class="text-sm font-medium">Create with AI</span>
        </button>

        <button
          (click)="askAI()"
          class="group flex w-full cursor-pointer items-center gap-3 rounded-xl p-3 text-zinc-200 transition-all hover:bg-zinc-800"
        >
          <div
            class="flex h-8 w-8 items-center justify-center rounded-lg bg-zinc-800 text-zinc-400 group-hover:text-indigo-400"
          >
            <i class="pi pi-comment"></i>
          </div>
          <span class="text-sm font-medium">Ask All Boards</span>
        </button>
      </div>

      <p-divider></p-divider>

      <div class="pt-2">
        <button
          (click)="createWorkspace()"
          class="flex w-full cursor-pointer items-center gap-3 rounded-xl p-3 text-zinc-300 transition-all hover:bg-zinc-800 hover:text-white"
        >
          <i class="pi pi-plus-circle text-lg"></i>
          <span class="text-sm">New Workspace</span>
        </button>
      </div>
    </div>

    <div class="border-t border-zinc-800 pt-2">
      <button
        (click)="logout()"
        class="flex w-full cursor-pointer items-center gap-3 rounded-xl p-3 text-zinc-400 transition-all hover:bg-red-500/10 hover:text-red-500"
      >
        <i class="pi pi-sign-out"></i>
        <span class="text-sm font-medium">Sign Out</span>
      </button>
    </div>
  </div>
</p-drawer>

<button
  class="cursor-pointer transition-transform hover:scale-120"
  (click)="visible = true"
>
  <i class="pi pi-bars text-2xl! text-white/70"></i>
</button>
