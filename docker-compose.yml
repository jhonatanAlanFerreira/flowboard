version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: dev-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password

  laravel:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dev-laravel
    restart: unless-stopped
    depends_on:
      - mysql
    volumes:
      - ./backend/flowboard:/var/www/html
      - ./backend/flowboard/vendor:/var/www/html/vendor
    ports:
      - "${BACKEND_PORT}:8000"
    working_dir: /var/www/html
    command: sh -c "composer install && php artisan serve --host=0.0.0.0 --port=8000"

  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dev-queue
    restart: unless-stopped
    depends_on:
      - mysql
      - laravel
    volumes:
      - ./backend/flowboard:/var/www/html
      - ./backend/flowboard/vendor:/var/www/html/vendor
    working_dir: /var/www/html
    command: sh -c "composer install && php artisan queue:work --timeout=0"

  angular:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dev-angular
    ports:
      - "${APP_PORT}:4200"
    volumes:
      - ./frontend/flowboard:/usr/src/app
    command: sh -c "npm install && ng serve --host 0.0.0.0 --port 4200"

  ai-api:
    profiles: ["ai"]
    build:
      context: ./ai-api
      dockerfile: Dockerfile
    container_name: dev-ai-api
    restart: unless-stopped
    depends_on:
      - redis
    volumes:
      - ./ai-api:/app
      - ./models:/models
    ports:
      - "${AI_API_PORT}:8001"
    working_dir: /app
    environment:
      MODEL_PATH: "${MODEL_PATH}"
      PHOENIX_ENDPOINT: "http://dev-phoenix:4317"
      LOAD_LLM: 0
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  ai-worker:
    profiles: ["ai"]
    build:
      context: ./ai-api
      dockerfile: Dockerfile
    container_name: dev-ai-worker
    restart: unless-stopped
    depends_on:
      - redis
      - ai-api
    volumes:
      - ./ai-api:/app
      - ./models:/models
    working_dir: /app
    environment:
      MODEL_PATH: "${MODEL_PATH}"
      BACKEND_URL: "http://dev-laravel:8000"
      PHOENIX_ENDPOINT: "http://dev-phoenix:4317"
      AI_API_SECRET: "${AI_API_SECRET}"
      LOAD_LLM: 1
    command: celery -A app.celery_app worker -Q tagging,workflow,celery --loglevel=info --concurrency=1

  weaviate:
    image: semitechnologies/weaviate:latest
    container_name: dev-weaviate
    ports:
      - "8080:8080"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      ENABLE_MODULES: ""
      RAFT_BOOTSTRAP_TIMEOUT: 120
    volumes:
      - weaviate_data:/var/lib/weaviate

  redis:
    image: redis:7
    container_name: dev-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: dev-phoenix
    restart: unless-stopped
    ports:
      - "6006:6006"
      - "4317:4317"
    environment:
      PHOENIX_WORKING_DIR: /data
    volumes:
      - phoenix_data:/data

volumes:
  mysql_data:
  weaviate_data:
  phoenix_data:
